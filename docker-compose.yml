version: '3.8'

services:
  # ============================================================================
  # BACKEND - FastAPI with LangGraph AI Agents
  # ============================================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ticmi-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/ticmi
      - CHROMA_DB_HOST=chromadb
      - CHROMA_DB_PORT=8000
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - DEFAULT_LLM_MODEL=${DEFAULT_LLM_MODEL:-gemini-1.5-pro}
      - DEBUG=true
    volumes:
      - ./backend:/app
    depends_on:
      - db
      - chromadb
    networks:
      - ticmi-network
    restart: unless-stopped

  # ============================================================================
  # DATABASE - PostgreSQL
  # ============================================================================
  db:
    image: postgres:15-alpine
    container_name: ticmi-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ticmi
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ticmi-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================================
  # VECTOR DATABASE - ChromaDB for RAG
  # ============================================================================
  chromadb:
    image: chromadb/chroma:latest
    container_name: ticmi-chromadb
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - ticmi-network
    restart: unless-stopped

  # ============================================================================
  # FRONTEND - Next.js 14+
  # ============================================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ticmi-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - ticmi-network
    restart: unless-stopped

# ============================================================================
# NETWORKS & VOLUMES
# ============================================================================
networks:
  ticmi-network:
    driver: bridge

volumes:
  postgres_data:
  chroma_data:
